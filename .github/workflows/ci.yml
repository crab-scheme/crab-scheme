name: ci

# Pull-request + push-to-main / push-to-rc* gate. Catches build /
# test regressions before they land. Separate from the release
# workflow (which only fires on version tags); this one runs on
# every code-changing event to keep the default and rc branches
# green.
#
# Matrix: just ubuntu-x86_64 + macos-aarch64. Linux for the
# common-denominator dev target; macos-aarch64 for the
# Apple-Silicon dev box the maintainers work on. WASM build is
# its own job (no test step — WASM-runtime testing happens
# through bench/wasm-conformance.sh which needs wasmtime; that's
# a separate weekly job, not part of every-PR CI).
#
# Build speed: the bottleneck is release-compiling ~40 local
# crates + heavy deps (wasmtime / cranelift x2 / quinn) every run.
# sccache (RUSTC_WRAPPER + GitHub Actions cache backend) caches
# compiler outputs across runs *including the local crates* (which
# Swatinem/rust-cache deliberately doesn't), so warm runs reuse
# them. rust-cache stays for the registry/index only
# (`cache-targets: false`) so the two don't fight over `target/`.
# (cargo-nextest was tried but dropped: its process-per-test model
# races on shared `target/` artifacts that some integration tests —
# cs-cli's AOT level-3 — build + link, which `cargo test`'s
# single-process run serializes.)
#
# Resilience: sccache hard-fails if its cache backend is
# unreachable (the GitHub Actions cache service has outages). So we
# only flip RUSTC_WRAPPER on *after* confirming the sccache server
# starts; if it can't (cache backend down), the build proceeds
# without sccache — slower, but green instead of spuriously red.
# The "Enable sccache" step is the single gate for that.

on:
  push:
    branches: [main, "rc*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # sccache needs incremental compilation off (it caches whole
  # compilation units); release already defaults to incremental=false,
  # set explicitly so it holds for any profile.
  CARGO_INCREMENTAL: "0"
  SCCACHE_GHA_ENABLED: "true"
  # NOTE: RUSTC_WRAPPER is intentionally NOT set here — the "Enable
  # sccache" step sets it only when the sccache server actually
  # starts, so a cache-backend outage falls back to plain cargo.

jobs:
  test:
    name: test ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"
          components: rustfmt, clippy

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      # Registry/index cache only — sccache owns the compilation cache,
      # so caching `target/` here too would be redundant and can mask
      # sccache hits.
      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: ci-${{ matrix.os }}
          cache-targets: "false"

      - name: Enable sccache (fall back to plain cargo if its backend is down)
        shell: bash
        run: |
          if sccache --start-server; then
            echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
            echo "sccache enabled"
          else
            echo "::warning title=sccache::cache backend unavailable — building without sccache this run"
          fi

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Build workspace
        run: cargo build --workspace --release

      - name: Run workspace tests
        # Plain `cargo test` (not nextest): some integration tests — e.g.
        # cs-cli's AOT level-3 tests — shell out to `cargo build` and link the
        # shared `target/release/libcs_aot_rt.a`, and rely on cargo test's
        # single-process model to serialize that setup. nextest's
        # process-per-test parallelism races on those shared artifacts.
        run: cargo test --workspace --release

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  wasm-build:
    name: wasm32-wasip1 build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + wasm32-wasip1 target
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"
          targets: wasm32-wasip1

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: ci-wasm
          cache-targets: "false"

      - name: Enable sccache (fall back to plain cargo if its backend is down)
        shell: bash
        run: |
          if sccache --start-server; then
            echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
            echo "sccache enabled"
          else
            echo "::warning title=sccache::cache backend unavailable — building without sccache this run"
          fi

      - name: Build wasm32-wasip1
        # Confirms the no-default-features build still produces a
        # valid WASM binary. Doesn't run it (no wasmtime on the
        # runner by default; see bench/wasm-conformance.sh for the
        # runtime sweep).
        run: cargo build --target wasm32-wasip1 --release -p cs-cli --no-default-features

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  wasm-build-wasip2:
    name: wasm32-wasip2 build
    # #9 iter-1 — establish a wasip2 build baseline. The networking
    # modules (cs-stdlib-net / http / websocket) stay out of this build
    # (the `--no-default-features` set excludes them); later iters add
    # them behind the `wasm-stdlib-full` feature. This job just confirms
    # cs-cli compiles for `wasm32-wasip2` so subsequent iters have a
    # green starting point on this target.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + wasm32-wasip2 target
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"
          targets: wasm32-wasip2

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          # Separate key from `ci-wasm` so the wasip1 and wasip2 caches
          # don't fight; sccache covers the compilation cache for both.
          key: ci-wasm-p2
          cache-targets: "false"

      - name: Enable sccache (fall back to plain cargo if its backend is down)
        shell: bash
        run: |
          if sccache --start-server; then
            echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
            echo "sccache enabled"
          else
            echo "::warning title=sccache::cache backend unavailable — building without sccache this run"
          fi

      - name: Build wasm32-wasip2
        # Same shape as the wasip1 job: confirms the no-default-features
        # build produces a valid component for the wasip2 target.
        run: cargo build --target wasm32-wasip2 --release -p cs-cli --no-default-features

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  wasm-build-wasip2-full:
    # #9 iter-7 — exercise the `wasm-stdlib-full` networking subset
    # under `wasm32-wasip2` in CI. Builds cs-cli with the wasi:sockets-
    # 0.2 + wasi:http-0.2 modules wired in (cs-stdlib-net + cs-stdlib-
    # http client/server scaffold + cs-stdlib-websocket); proves the
    # full chain compiles every PR.
    #
    # Runtime conformance (wasmtime 28+ end-to-end exercise of crab-net
    # / crab-http / crab-websocket fixtures) is deferred to a follow-up
    # iter — that step needs `wasm-tools component new` plus a
    # sidecar test server for HTTP/WS round-trips, which is its own
    # CI orchestration project. See ADR 0033 + the docs/examples/
    # wasip2-http-server-cond-expand.scm sample for the expected
    # programming model.
    name: wasm32-wasip2 build (wasm-stdlib-full)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + wasm32-wasip2 target
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"
          targets: wasm32-wasip2

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: ci-wasm-p2-full
          cache-targets: "false"

      - name: Enable sccache (fall back to plain cargo if its backend is down)
        shell: bash
        run: |
          if sccache --start-server; then
            echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
            echo "sccache enabled"
          else
            echo "::warning title=sccache::cache backend unavailable — building without sccache this run"
          fi

      - name: Build wasm32-wasip2 with wasm-stdlib-full
        # Same `--no-default-features` posture as the wasip1 job above
        # (excludes JIT / FFI / actor / AOT — those don't link on wasm),
        # plus the wasip2 networking subset.
        run: cargo build --target wasm32-wasip2 --release -p cs-cli --no-default-features --features wasm-stdlib-full

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true
