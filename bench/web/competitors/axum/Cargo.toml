[workspace]

[package]
name = "axum-hello"
version = "0.0.1"
edition = "2021"
publish = false

[dependencies]
axum = { version = "0.7", default-features = false, features = ["http1", "tokio"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net"] }

[profile.release]
lto = "thin"
codegen-units = 1
