[package]
name = "cs-stdlib-http"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

description = "CrabScheme stdlib module (crab http client + server) — synchronous HTTP."

[dependencies]
cs-core = { workspace = true }
cs-ffi = { workspace = true }

# Native HTTP stack (#9 iter-3):
# - `ureq` — sync HTTP client. No Tokio dep, smaller than reqwest,
#   blocks the caller (matches our "drive concurrency from BEAM actors"
#   posture). Doesn't build on any wasm32 target.
# - `tiny_http` — matching sync server. Accept loop blocks; needs
#   `std::thread::spawn`, also not portable to wasm32.
[target.'cfg(not(target_os = "wasi"))'.dependencies]
ureq = { version = "2", default-features = false, features = ["tls"] }
tiny_http = "0.12"

# wasi HTTP stack (#9 iter-3 client; iter-5 server). `wasi-http-client`
# binds the `wasi:http/0.2.0` outgoing-handler world and exposes a sync
# blocking client compatible with our existing alist response shape.
# Requires Wasmtime 28+; see ADR 0033.
[target.'cfg(target_os = "wasi")'.dependencies]
wasi-http-client = "0.2.1"
