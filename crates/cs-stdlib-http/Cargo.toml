[package]
name = "cs-stdlib-http"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

description = "CrabScheme stdlib module (crab http client + server) — synchronous HTTP."

[dependencies]
cs-core = { workspace = true }
cs-ffi = { workspace = true }

# Native HTTP stack (#9 iter-3):
# - `ureq` — sync HTTP client. No Tokio dep, smaller than reqwest,
#   blocks the caller (matches our "drive concurrency from BEAM actors"
#   posture). Doesn't build on any wasm32 target.
# - `tiny_http` — matching sync server. Accept loop blocks; needs
#   `std::thread::spawn`, also not portable to wasm32.
[target.'cfg(not(target_os = "wasi"))'.dependencies]
ureq = { version = "2", default-features = false, features = ["tls"] }
tiny_http = "0.12"

# wasi HTTP stack (#9 iter-3 client + iter-5 server). Both require
# Wasmtime 28+ at runtime; see ADR 0033.
#  - `wasi-http-client` binds the `wasi:http/0.2.0` outgoing-handler
#    world (client side).
#  - `wasi` provides the `wasi:http/proxy::export!` macro + the
#    `incoming_handler::Guest` trait for the server side (iter-5).
[target.'cfg(target_os = "wasi")'.dependencies]
wasi-http-client = "0.2.1"
wasi = { version = "0.13", default-features = false }
