[package]
name = "cs-stdlib-http"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

description = "CrabScheme stdlib module (crab http client + server) — synchronous HTTP."

[dependencies]
cs-core = { workspace = true }
cs-ffi = { workspace = true }
# ureq is the sync HTTP client of choice for CrabScheme — no
# Tokio dep, smaller than reqwest, blocks the calling thread
# which matches our concurrency posture (drive concurrent IO
# from BEAM actors).
ureq = { version = "2", default-features = false, features = ["tls"] }
# tiny_http is the matching sync server — no Tokio dep, accept
# loop blocks. Drive concurrent connections from BEAM actors.
tiny_http = "0.12"
