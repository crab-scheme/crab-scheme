[package]
name = "cs-core"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[features]
# Iter 11: default-on. Forward the countable-memory feature down
# to cs-gc so consumer crates inherit transparently. Adds
# parallel CycleVisit impls alongside the existing Trace impls
# under the same #[cfg].
default = ["countable-memory"]
countable-memory = ["cs-gc/countable-memory"]
# Forwards the cs-gc `regions` feature so the layer-3 (region
# memory) Promote trait + deep-promotion machinery becomes
# available on Value. Off by default until region-memory spec
# iter 6.
regions = ["cs-gc/regions"]

[dependencies]
cs-diag = { workspace = true }
cs-gc = { workspace = true }
num-bigint = { workspace = true }
num-rational = { workspace = true }
num-traits = { workspace = true }
