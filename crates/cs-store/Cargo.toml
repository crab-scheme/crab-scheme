[package]
name = "cs-store"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

description = "CrabScheme stdlib module (crab store) — RocksDB key-value store FFI binding."

# rocksdb vendors and compiles the RocksDB C++ library, so this crate
# requires a C++ compiler at build time and does NOT cross-compile to
# wasm32-wasip1. Excluded from `wasm-stdlib` (like cs-stdlib-sql / cs-stdlib-tls).
[dependencies]
cs-core = { workspace = true }
cs-ffi = { workspace = true }
rocksdb = { workspace = true }

[dev-dependencies]
tempfile = "3"
