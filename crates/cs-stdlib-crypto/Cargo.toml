[package]
name = "cs-stdlib-crypto"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

description = "CrabScheme stdlib module (crab crypto) — secure randomness, AEAD encryption, and Ed25519 signatures."

# All pure-Rust (RustCrypto + dalek) crates — no C, no OpenSSL — so
# the module cross-compiles to wasm32-wasip1 (getrandom uses the WASI
# `random_get` backend there). Versions are pinned in this crate
# rather than the workspace, matching the cs-stdlib-hash convention.
[dependencies]
cs-core = { workspace = true }
cs-ffi = { workspace = true }
getrandom = "0.2"
chacha20poly1305 = "0.10"
ed25519-dalek = "2"
subtle = "2"
base64 = "0.22"
