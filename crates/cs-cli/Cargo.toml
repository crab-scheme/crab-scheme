[package]
name = "cs-cli"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[[bin]]
name = "crabscheme"
path = "src/main.rs"

[features]
# M10 Track W iter 1 — mirror cs-runtime's feature flags. The CLI's
# default keeps the full native build (jit + ffi). --no-default-
# features produces a minimal build suitable for WASM (W2+).
default = ["jit", "ffi"]
jit = ["cs-runtime/jit"]
ffi = ["cs-runtime/ffi"]

[dependencies]
cs-core = { workspace = true }
cs-diag = { workspace = true }
# Workspace dep declares default-features = false; cs-cli's own
# features explicitly turn on `cs-runtime/jit` / `cs-runtime/ffi`
# when requested. --no-default-features on cs-cli produces a
# minimal runtime (target for W2's wasm32-wasip1 build).
cs-runtime = { workspace = true }
clap = { workspace = true }
