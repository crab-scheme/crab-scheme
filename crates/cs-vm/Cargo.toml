[package]
name = "cs-vm"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[features]
# Iter 11: default-on. Forward the countable-memory feature down
# to cs-core (which forwards to cs-gc). Required so the cs-vm
# crate's CycleVisit impls (VmClosure, Bindings, Env) compile
# against the feature-gated trait.
default = ["countable-memory", "regions"]
countable-memory = ["cs-core/countable-memory"]
# Forwards the cs-gc `regions` feature so the VM can
# operate on region-allocated heap values. The VM has no
# region-specific code paths today — it just sees Gc<T>
# polymorphically — so this is purely about feature
# propagation.
regions = ["cs-core/regions", "cs-gc/regions"]

[dependencies]
cs-core = { workspace = true }
cs-diag = { workspace = true }
cs-gc = { workspace = true }
cs-ir = { workspace = true }
cs-jit = { workspace = true }
cs-rir = { workspace = true }
num-traits = { workspace = true }
rustc-hash = { workspace = true }
smallvec = { workspace = true }
